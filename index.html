<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Arbitro Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
    .card { background: white; max-width: 620px; width: 100%; border-radius: 22px; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12); padding: 32px; }
    h1 { margin: 0 0 12px; font-size: 30px; }
    p { color: #475569; line-height: 1.5; }
    .links { display: grid; gap: 12px; margin-top: 22px; }
    a { display: block; padding: 16px; border-radius: 14px; background: #0f172a; color: white; text-decoration: none; font-weight: 800; }
    a.secondary { background: #2563eb; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Arbitro Pro</h1>
    <p>Links públicos para compartir con árbitros.</p>
    <div class="links">
      <a href="./register/">Registro de árbitros</a>
      <a class="secondary" href="./referee-availability/">Registro de disponibilidad</a>
    </div>
  </main>
</body>
</html>
